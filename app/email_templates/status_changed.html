<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статус заказа обновлён</title>
</head>
<body style="margin:0; padding:0; background-color:#F3FFFC; font-family:'IBM Plex Sans', system-ui, -apple-system, sans-serif; color:#004F44;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F3FFFC; padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#ffffff; border:1px solid #004F44; border-radius:5px; overflow:hidden;">

                    <tr>
                        <td style="background-color:#004F44; padding:24px 32px;">
                            <span style="color:#ffffff; font-size:22px; font-weight:600; letter-spacing:0.3px;">🌸 Дельфиниум.рф</span>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding:32px;">
                            <h1 style="margin:0 0 16px; font-size:24px; color:#004F44;">{{GREETING}}</h1>
                            <p style="margin:0 0 24px; font-size:16px; line-height:1.6; color:#234A45;">
                                Статус вашего заказа изменился. Теперь он:
                            </p>

                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 28px; background-color:#F3FFFC; border:1px solid #004F44; border-radius:5px;">
                                <tr>
                                    <td align="center" style="padding:22px 24px;">
                                        <span style="font-size:22px; font-weight:600; color:#004F44; letter-spacing:0.5px;">{{STATUS}}</span>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin:0 0 8px; font-size:14px; color:rgba(0,79,68,0.6);">Номер вашего заказа:</p>
                            <p style="margin:0 0 28px; font-size:15px; color:#004F44; font-family:monospace; word-break:break-all;">{{PUBLIC_ID}}</p>

                            <table role="presentation" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="border-radius:5px; background-color:#004F44;">
                                        <a href="{{ORDER_LINK}}" target="_blank" style="display:inline-block; padding:16px 44px; font-size:16px; font-weight:500; color:#ffffff; text-decoration:none; border-radius:5px;">Открыть заказ</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td style="background-color:#F3FFFC; padding:20px 32px; border-top:1px solid #004F44;">
                            <p style="margin:0; font-size:13px; color:rgba(0,79,68,0.6);">
                                2013–2025 © Дельфиниум.рф · Цветочная ферма, разводим дельфиниумы с 2013 года
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
